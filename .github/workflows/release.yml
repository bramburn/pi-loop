name: Release

on:
  push:
    branches: [master, main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # release-please is best-effort: it opens a Release PR if the repo settings
  # allow Actions to create PRs, but the workflow does not fail when it
  # cannot (common on first-time forks where the permission is not yet
  # granted). The npm-publish job is gated on a manual `v*.*.*` tag push
  # or a workflow_dispatch trigger, not on release-please's success.
  release-please:
    if: ${{ false }}  # disabled until repo settings allow PR creation
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  npm-publish:
    if: |
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test:coverage

      - run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
