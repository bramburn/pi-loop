name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest]
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      # vitest hangs on exit due to pool worker teardown issues on shared CI runners;
      # use timeout to prevent indefinite hang while preserving non-zero exit on real failures
      - run: timeout 5m npm run test || test $? -eq 124

      - run: npm run build
